<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ertan Ulutürk | Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', sans-serif; margin: 0; }
        #loginScreen { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border: 1px solid #eee; position: relative; overflow: hidden; }
        
        .security-badge { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; background: #ecfdf5; color: #10b981; padding: 5px 12px; border-radius: 100px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .login-logo { width: 80px; height: 80px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #f8fafc; }
        
        .login-title { font-size: 1.8rem; font-weight: 900; color: #1e293b; margin-bottom: 10px; letter-spacing: -1px; }
        .login-subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 35px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 0.75rem; font-weight: 700; color: #475569; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .login-input { width: 100%; padding: 15px 20px; border-radius: 15px; border: 2px solid #f1f5f9; background: #f8fafc; color: #1e293b; font-size: 1rem; font-weight: 600; transition: 0.3s; box-sizing: border-box; outline: none; text-align: center; }
        .login-input:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .btn-login { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #10b981; color: white; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-login:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        
        #dashboard { display: none; padding: 30px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 40px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 40px; border: 1px solid #eee; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-img { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; background: #f0fdf4; color: #10b981; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 1px solid #d1fae5; }
        .logout-btn { background: #fee2e2; color: #ef4444; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .logout-btn:hover { background: #ef4444; color: white; }

        .main-grid { display: grid; grid-template-cols: 400px 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1024px) { .main-grid { grid-template-cols: 1fr; } }
        
        .card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .card-title { font-size: 1.2rem; font-weight: 800; color: #1e293b; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .listing-box { background: #fff; padding: 15px; border-radius: 18px; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; transition: 0.3s; }
        .listing-box:hover { border-color: #10b981; transform: translateX(5px); }
        .listing-info { display: flex; align-items: center; gap: 15px; }
        .listing-info img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #f8fafc; border: 1px solid #eee; }
        .listing-title { font-weight: 700; color: #1e293b; font-size: 0.9rem; }
        .btn-delete { background: #fff1f2; color: #fb7185; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { background: #fb7185; color: white; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="security-badge"><i class="fas fa-shield-check"></i> VANGUARD SECURE</div>
            <div class="login-logo flex items-center justify-center bg-indigo-50 text-indigo-600 mx-auto">
                <i class="fas fa-home-work text-3xl"></i>
            </div>
            <h1 class="login-title">Ertan Ulutürk</h1>
            <p class="login-subtitle">Emlak Yönetim Paneli</p>
            
            <div class="input-group">
                <label class="input-label">Yönetici E-Posta</label>
                <input type="email" id="adminEmail" class="login-input" placeholder="admin@emlak.com">
            </div>

            <div class="input-group">
                <label class="input-label">Erişim Şifresi</label>
                <input type="password" id="adminPass" class="login-input" placeholder="••••••••" style="letter-spacing: 0.3em;">
            </div>

            <button onclick="login()" id="loginBtn" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> SİSTEME GİRİŞ YAP
            </button>
        </div>
    </div>

    <div id="dashboard">
        <div class="dash-header">
            <div class="user-info">
                <div class="user-img"><i class="fas fa-user-tie"></i></div>
                <div>
                    <h2 style="margin:0; font-size:1.1rem; font-weight:800;">Ertan Ulutürk</h2>
                    <span style="font-size:0.7rem; color:#10b981; font-weight:bold; text-transform:uppercase;">Gayrimenkul Portföy Yöneticisi</span>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-power-off"></i> GÜVENLİ ÇIKŞ</button>
        </div>

        <div class="main-grid">
            <div class="card h-fit">
                <h3 class="card-title"><i class="fas fa-plus-circle" style="color:#10b981;"></i> Yeni İlan Yayınla</h3>
                <input type="text" id="newTitle" class="login-input" placeholder="İlan Başlığı (Örn: Kandıra'da Satılık Arsa)" style="text-align:left; margin-bottom:15px; font-size:0.9rem;">
                <textarea id="newDesc" class="login-input" placeholder="İlan Detayları, m2, Fiyat bilgisi..." style="text-align:left; margin-bottom:15px; height:150px; font-size:0.9rem; resize:none;"></textarea>
                
                <input type="file" id="fileInp" multiple style="display:none;">
                <button onclick="document.getElementById('fileInp').click()" style="width:100%; padding:15px; border:2px dashed #e2e8f0; border-radius:15px; color:#64748b; font-weight:bold; cursor:pointer; margin-bottom:15px; font-size:0.8rem; background: #f8fafc;">
                    <i class="fas fa-images" style="margin-right:10px;"></i> İLAN FOTOĞRAFLARI SEÇ
                </button>
                <div id="previews" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;"></div>

                <button onclick="saveProduct()" id="saveBtn" class="btn-login" style="background:#1e293b;">
                    <i class="fas fa-cloud-upload-alt"></i> İLANI SİSTEME EKLE
                </button>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-map-location-dot"></i> Yayındaki İlanlar</h3>
                <div id="productGrid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwfEYe0JztVcatqsbI6vUmjizJBaSKpYQ",
            authDomain: "messi-2704f.firebaseapp.com",
            projectId: "messi-2704f",
            storageBucket: "messi-2704f.firebasestorage.app",
            messagingSenderId: "605613457448",
            appId: "1:605613457448:web:d8f4de486df83a1e3d751d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let tempImages = [];

        // OTURUM TAKİBİ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadProducts();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // GİRİŞ
        window.login = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            if (!email || !pass) return alert('Bilgileri eksiksiz doldurun.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> DOĞRULANIYOR...';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert('Hatalı Giriş! Yetkisiz deneme engellendi.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> SİSTEME GİRİŞ YAP';
            }
        };

        window.logout = async () => {
            if(confirm('Çıkış yapılsın mı?')) await signOut(auth);
        };

        // İLANLARI YÜKLE
        window.loadProducts = async () => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-circle-notch fa-spin text-3xl" style="color:#10b981;"></i></div>';
            
            try {
                const snap = await getDocs(collection(db, "arsalar"));
                grid.innerHTML = '';
                if(snap.empty) grid.innerHTML = '<p style="text-align:center; color:#94a3b8; padding:50px;">Henüz aktif ilan bulunmuyor.</p>';
                
                snap.forEach(d => {
                    const p = d.data();
                    const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/80';
                    const div = document.createElement('div');
                    div.className = "listing-box";
                    div.innerHTML = `
                        <div class="listing-info">
                            <img src="${img}">
                            <div>
                                <span style="font-size:0.6rem; background:#ecfdf5; color:#10b981; padding:3px 8px; border-radius:6px; font-weight:bold;">AKTİF PORTFÖY</span><br>
                                <span class="listing-title">${p.title}</span>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${d.id}')" class="btn-delete"><i class="fas fa-trash-alt"></i></button>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { console.error(e); }
        };

        // İLAN KAYDET
        window.saveProduct = async () => {
            const t = document.getElementById('newTitle').value;
            const d = document.getElementById('newDesc').value;
            const btn = document.getElementById('saveBtn');

            if(!t || tempImages.length === 0) return alert('İlan başlığı ve en az bir fotoğraf gereklidir.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> YAYINLANIYOR...';

            try {
                await addDoc(collection(db, "arsalar"), {
                    title: t, desc: d, images: tempImages, date: new Date().toISOString()
                });
                document.getElementById('newTitle').value = '';
                document.getElementById('newDesc').value = '';
                tempImages = [];
                document.getElementById('previews').innerHTML = '';
                loadProducts();
                alert('İlan başarıyla yayınlandı!');
            } catch (err) { alert('Hata: Fotoğraf boyutları çok yüksek olabilir.'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> İLANI SİSTEME EKLE';
            }
        };

        window.deleteProduct = async (id) => {
            if(confirm('Bu ilanı kalıcı olarak silmek istediğinize emin misiniz?')) {
                await deleteDoc(doc(db, "arsalar", id));
                loadProducts();
            }
        };

        // FOTOĞRAF ÖNİZLEME
        document.getElementById('fileInp').onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    tempImages.push(ev.target.result);
                    const i = document.createElement('img');
                    i.src = ev.target.result;
                    i.style.width = "60px"; i.style.height = "60px"; i.style.borderRadius = "12px"; i.style.objectFit = "cover"; i.style.border = "1px solid #ddd";
                    document.getElementById('previews').appendChild(i);
                };
                r.readAsDataURL(f);
            });
        };
    </script>
</body>
</html>
