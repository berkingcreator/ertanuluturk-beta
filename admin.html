<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ertan Ulutürk Yönetim Paneli | YBG13™ Vanguard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // 🛡️ Firebase Auth Modülleri
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwfEYe0JztVcatqsbI6vUmjizJBaSKpYQ",
            authDomain: "messi-2704f.firebaseapp.com",
            projectId: "messi-2704f",
            storageBucket: "messi-2704f.firebasestorage.app",
            messagingSenderId: "605613457448",
            appId: "1:605613457448:web:d8f4de486df83a1e3d751d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.fs = { collection, addDoc, getDocs, deleteDoc, doc };
        window.authActions = { signInWithEmailAndPassword, signOut };

        // 🛡️ Oturum Yönetimi
        onAuthStateChanged(auth, (user) => {
            const loginScreen = document.getElementById('loginScreen');
            const dashboard = document.getElementById('dashboard');
            if (user) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
            }
        });
    </script>

    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        .input-field { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #cbd5e1; outline: none; transition: 0.3s; margin-bottom: 16px; }
        .input-field:focus { border-color: #4f46e5; ring: 2px; ring-color: #818cf8; }
        .btn-primary { width: 100%; background: #4f46e5; color: white; padding: 12px; border-radius: 12px; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
        .listing-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .listing-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-6">
        <div class="login-card text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Ertan Ulutürk</h2>
                <p class="text-slate-500 text-sm">YBG13™ Güvenli Giriş Paneli</p>
            </div>
            <input type="email" id="adminEmail" placeholder="E-posta adresi" class="input-field text-center">
            <input type="password" id="adminPass" placeholder="Şifre" class="input-field text-center">
            <button onclick="checkAdmin()" id="loginBtn" class="btn-primary">Giriş Yap</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">İlan Yönetimi</h1>
                <p class="text-slate-500 text-sm">Ertan Ulutürk Gayrimenkul Portföyü</p>
            </div>
            <button onclick="logout()" class="bg-slate-200 hover:bg-red-100 hover:text-red-600 p-3 rounded-xl transition text-slate-600">
                <i class="fas fa-power-off"></i> Güvenli Çıkış
            </button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm sticky top-8">
                    <h3 class="font-bold text-slate-800 mb-4">Yeni İlan Ekle</h3>
                    <input type="text" id="newTitle" placeholder="İlan Başlığı" class="input-field">
                    <textarea id="newDesc" placeholder="İlan Açıklaması..." class="input-field h-32 resize-none"></textarea>
                    
                    <input type="file" id="fileInp" multiple class="hidden">
                    <button onclick="document.getElementById('fileInp').click()" class="w-full mb-4 py-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-500 text-sm hover:bg-slate-50 transition">
                        <i class="fas fa-image mr-2"></i> Fotoğraf Yükle
                    </button>
                    <div id="previews" class="flex flex-wrap gap-2 mb-4"></div>

                    <button onclick="saveProduct()" id="saveBtn" class="btn-primary bg-slate-900 hover:bg-black">İlanı Yayınla</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="productGrid" class="grid sm:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let tempImages = [];

        async function checkAdmin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return alert("Bilgileri doldurun.");
            
            btn.innerText = "DOĞRULANIYOR...";
            btn.disabled = true;

            try {
                await window.authActions.signInWithEmailAndPassword(window.auth, email, pass);
            } catch (error) {
                alert("Hatalı Giriş! Yetkisiz deneme engellendi.");
                console.error(error);
            } finally {
                btn.innerText = "Giriş Yap";
                btn.disabled = false;
            }
        }

        async function logout() {
            if(confirm('Oturum kapatılsın mı?')) {
                await window.authActions.signOut(window.auth);
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400">Yükleniyor...</div>';
            
            try {
                const snap = await window.fs.getDocs(window.fs.collection(window.db, "arsalar"));
                grid.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/150';
                    const card = document.createElement('div');
                    card.className = 'listing-card flex flex-col';
                    card.innerHTML = `
                        <img src="${img}" class="w-full h-40 object-cover rounded-lg mb-4 bg-slate-100">
                        <h4 class="font-bold text-slate-800 truncate">${p.title}</h4>
                        <p class="text-xs text-slate-500 mb-4 line-clamp-2">${p.desc}</p>
                        <button onclick="deleteProduct('${d.id}')" class="mt-auto text-red-500 text-sm font-bold text-left hover:text-red-700">
                            <i class="fas fa-trash-alt mr-1"></i> İlanı Sil
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        document.getElementById('fileInp').onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    tempImages.push(ev.target.result);
                    const i = document.createElement('img');
                    i.src = ev.target.result;
                    i.className = "w-12 h-12 object-cover rounded-lg border";
                    document.getElementById('previews').appendChild(i);
                };
                r.readAsDataURL(f);
            });
        };

        async function saveProduct() {
            const t = document.getElementById('newTitle').value;
            const d = document.getElementById('newDesc').value;
            const btn = document.getElementById('saveBtn');

            if(!t || tempImages.length === 0) return alert("Başlık ve görsel zorunludur.");
            
            btn.innerText = "YAYINLANIYOR...";
            btn.disabled = true;

            try {
                await window.fs.addDoc(window.fs.collection(window.db, "arsalar"), {
                    title: t, desc: d, images: tempImages, date: new Date().toISOString()
                });
                tempImages = [];
                document.getElementById('previews').innerHTML = '';
                document.getElementById('newTitle').value = '';
                document.getElementById('newDesc').value = '';
                loadProducts();
                alert("İlan yayına alındı.");
            } catch (err) { alert("Hata oluştu."); }
            finally {
                btn.innerText = "İlanı Yayınla";
                btn.disabled = false;
            }
        }

        async function deleteProduct(id) {
            if(confirm('İlan silinecek, emin misiniz?')) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "arsalar", id));
                loadProducts();
            }
        }

        window.checkAdmin = checkAdmin;
        window.saveProduct = saveProduct;
        window.deleteProduct = deleteProduct;
        window.logout = logout;
    </script>
</body>
</html>
