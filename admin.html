<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ertan Ulutürk Yönetim Paneli | YBG13™ Vanguard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', sans-serif; }
        #loginScreen { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border: 1px solid #eee; }
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: center; font-weight: 500; }
        .input-field:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn-login { width: 100%; background: #4f46e5; color: white; padding: 15px; border-radius: 12px; font-weight: 700; transition: 0.3s; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
        .btn-login:hover { background: #4338ca; transform: translateY(-2px); }
        #dashboard { display: none; padding: 40px; }
        .listing-box { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; transition: 0.3s; }
        .listing-box:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .listing-info { display: flex; align-items: center; gap: 15px; }
        .listing-info img { width: 60px; height: 60px; object-cover; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Ertan Ulutürk</h2>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">YBG13™ Vanguard v4.0</p>
            </div>
            
            <input type="email" id="adminEmail" placeholder="Yönetici E-Posta" class="input-field">
            <input type="password" id="adminPass" placeholder="Erişim Şifresi" class="input-field tracking-widest">
            
            <button onclick="login()" id="loginBtn" class="btn-login">Sistemi Doğrula</button>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto w-full">
        <div class="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-black text-gray-800">İlan Yönetimi</h1>
                <p class="text-indigo-500 text-[10px] font-bold uppercase tracking-widest">Gayrimenkul Portföy Kontrolü</p>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 font-bold transition flex items-center gap-2">
                <i class="fas fa-power-off"></i> Çıkış Yap
            </button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm sticky top-10">
                    <h3 class="font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-indigo-500"></i> Yeni İlan Ekle
                    </h3>
                    <input type="text" id="newTitle" placeholder="İlan Başlığı" class="input-field text-left">
                    <textarea id="newDesc" placeholder="İlan Detayları..." class="input-field text-left h-32 resize-none"></textarea>
                    
                    <input type="file" id="fileInp" multiple class="hidden">
                    <button onclick="document.getElementById('fileInp').click()" class="w-full mb-4 py-4 border-2 border-dashed border-indigo-100 rounded-xl text-indigo-500 font-bold text-sm hover:bg-indigo-50 transition">
                        <i class="fas fa-camera mr-2"></i> Fotoğrafları Seç
                    </button>
                    <div id="previews" class="flex flex-wrap gap-2 mb-6"></div>

                    <button onclick="saveProduct()" id="saveBtn" class="btn-login bg-gray-900 shadow-none hover:bg-black">İlanı Yayınla</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="productGrid">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwfEYe0JztVcatqsbI6vUmjizJBaSKpYQ",
            authDomain: "messi-2704f.firebaseapp.com",
            projectId: "messi-2704f",
            storageBucket: "messi-2704f.firebasestorage.app",
            messagingSenderId: "605613457448",
            appId: "1:605613457448:web:d8f4de486df83a1e3d751d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let tempImages = [];

        // OTURUM TAKİBİ
        onAuthStateChanged(auth, (user) => {
            const loginScreen = document.getElementById('loginScreen');
            const dashboard = document.getElementById('dashboard');
            if (user) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
            }
        });

        // FONKSİYONLAR
        window.login = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            if (!email || !pass) return alert('Lütfen bilgileri doldurun.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Doğrulanıyor...';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert('Erişim Reddedildi! Geçersiz kimlik bilgileri.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sistemi Doğrula';
            }
        };

        window.logout = async () => {
            if(confirm('Güvenli çıkış yapılsın mı?')) await signOut(auth);
        };

        window.loadProducts = async () => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<div class="text-center py-10 text-gray-400">Veriler taranıyor...</div>';
            
            try {
                const snap = await getDocs(collection(db, "arsalar"));
                grid.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/150';
                    const div = document.createElement('div');
                    div.className = "listing-box group";
                    div.innerHTML = `
                        <div class="listing-info">
                            <img src="${img}" alt="Arsa">
                            <div>
                                <span class="text-[9px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md font-bold mb-1 inline-block">AKTİF İLAN</span>
                                <h3 class="font-bold text-gray-800 text-sm line-clamp-1">${p.title}</h3>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${d.id}')" class="text-gray-300 hover:text-red-500 transition px-4 py-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { console.error(e); }
        };

        window.saveProduct = async () => {
            const t = document.getElementById('newTitle').value;
            const d = document.getElementById('newDesc').value;
            const btn = document.getElementById('saveBtn');

            if(!t || tempImages.length === 0) return alert('Başlık ve en az bir fotoğraf zorunludur.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Yayınlanıyor...';

            try {
                await addDoc(collection(db, "arsalar"), {
                    title: t, desc: d, images: tempImages, date: new Date().toISOString()
                });
                document.getElementById('newTitle').value = '';
                document.getElementById('newDesc').value = '';
                tempImages = [];
                document.getElementById('previews').innerHTML = '';
                loadProducts();
                alert('İlan başarıyla yayınlandı.');
            } catch (err) { alert('Hata oluştu!'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = 'İlanı Yayınla';
            }
        };

        window.deleteProduct = async (id) => {
            if(confirm('Bu ilanı kalıcı olarak silmek istiyor musunuz?')) {
                await deleteDoc(doc(db, "arsalar", id));
                loadProducts();
            }
        };

        // Görsel Seçme & Önizleme
        document.getElementById('fileInp').onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    tempImages.push(ev.target.result);
                    const i = document.createElement('img');
                    i.src = ev.target.result;
                    i.className = "w-14 h-14 object-cover rounded-xl border border-gray-100 shadow-sm";
                    document.getElementById('previews').appendChild(i);
                };
                r.readAsDataURL(f);
            });
        };
    </script>
</body>
</html>
